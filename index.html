<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sufra Printer</title>
    <script>
      // Apply persisted locale before the app mounts so there's no LTR flash.
      try {
        var v = localStorage.getItem('sufra_printer_locale')
        var loc = v === 'en' ? 'en' : 'ar'
        document.documentElement.lang = loc
        document.documentElement.dir = loc === 'ar' ? 'rtl' : 'ltr'
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
