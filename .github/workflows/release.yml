name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'linux-amd64'
          - platform: 'windows-latest'
            target: 'windows-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux build deps
        # webkit2gtk + libusb (rusb) + the rest of the Tauri 2 Linux toolchain.
        # Ubuntu 24.04 switched to webkit2gtk-4.1 (Tauri 2 supports both 4.0 and 4.1).
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libusb-1.0-0-dev \
            patchelf

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Sufra Printer ${{ github.ref_name }}'
          releaseBody: |
            ## Sufra Printer ${{ github.ref_name }}

            Silent ESC/POS thermal printer bridge for the Sufra dashboard.

            ### Downloads
            - **Windows**: `.msi` installer below
            - **Linux**: `.AppImage` (portable) or `.deb` (Debian / Ubuntu)

            ### What's new
            See commits since the previous tag.
          releaseDraft: false
          prerelease: false
